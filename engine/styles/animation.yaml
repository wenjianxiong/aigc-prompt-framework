## 风格-类型匹配建议

| 项目类型 | 推荐动画风格 |
|----------|------------|
| 漫剧（仙侠/玄幻） | 国风动画 / 日系动画 |
| 漫剧（都市/校园） | 日系动画 / 2D扁平插画 |
| 漫剧（儿童向） | 绘本动画 / 3D黏土质感 |
| 漫剧（热血/战斗） | 日系动画 / 欧美卡通 |
| 电影短篇（艺术向） | 2D手绘电影 / 国风动画 |
| 电影短篇（实验向） | 定格动画 / 3D黏土质感 |
| 广告短片 | 3D卡通电影 / 2D扁平插画 |
