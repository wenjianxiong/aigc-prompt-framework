# 🧱 风格引擎 — 动画类风格预设（10种）

---

## 1. 3D 写实动画风格

```yaml
style: 3D写实动画
lighting:
  primary: "PBR 物理精确光照，HDRI 环境贴图"
  secondary: "区域光补光"
  ambient: "全局光照 + 环境光遮蔽"
  mood: "接近真人电影但保留 CG 的完美感"
render:
  engine: "Octane / Arnold / Unreal Engine 5 质感"
  subsurface: "皮肤 3S 材质，通透感"
  displacement: "微表面位移贴图（毛孔/布料纹理）"
lens:
  type: "虚拟85mm变形宽银幕"
  aperture: "f/1.8"
  dof: "Cinematic DOF"
  resolution: "8K"
palette: "ACES 电影色彩空间"
negative: "低多边形、游戏引擎感、卡通着色"
```

---

## 2. 3D 卡通电影风格

```yaml
style: 3D卡通电影
lighting:
  primary: "风格化布光，清晰的高光与阴影边界"
  secondary: "柔和补光降低对比度"
  ambient: "环境色温偏暖"
  mood: "皮克斯/迪士尼动画电影质感"
render:
  engine: "RenderMan / 皮克斯风格"
  style: "PBR 材质 + 风格化着色器"
  proportions: "角色造型略带夸张（头身比/表情幅度）"
lens:
  type: "虚拟电影镜头"
  aperture: "f/2.8-f/4"
  dof: "选择性焦点，引导观众视线"
  resolution: "4K-8K"
palette: "鲜艳但不刺眼——暖色为主，冷色点缀"
negative: "超写实皮肤、恐怖谷、黑暗成人向"
```

---

## 3. 3D 黏土质感动画风格

```yaml
style: 3D黏土质感
lighting:
  primary: "柔和的暖色顶光，模拟定格动画棚拍"
  secondary: "柔光箱补光，消除硬阴影"
  ambient: "暖黄环境光"
  mood: "手工感、温暖、童趣"
texture:
  overall: "黏土/橡皮泥表面——细微指纹、捏痕、不平整表面"
  character: "圆润造型，四肢粗短，关节可见拼接线"
  environment: "手工搭建感——纸板房屋、棉絮云朵、毛线草皮"
  surface: "哑光，轻微粗糙度，无镜面反射"
fps: "12-15fps 轻微卡顿的定格动画节奏"
palette: "柔和粉彩 / 马卡龙色系"
negative: "完美光滑表面、镜面反射、锐利边缘、高帧率流畅运动"
```

---

## 4. 2D 手绘电影风格

```yaml
style: 2D手绘电影
lighting:
  primary: "手绘光影——水彩渲染或色块平涂的光影分层"
  secondary: "留白高光，不追求物理准确"
  mood: "手绘温度、艺术性、每帧都是一张画"
technique:
  line: "可见手绘线条，粗细变化自然，允许轻微抖动"
  color: "水彩/水粉/彩铅/水墨质感"
  background: "与角色统一手绘风格，可能更写意"
  animation: "全逐帧或有限动画（一拍二/一拍三）"
lens: "手绘模拟的电影构图——广角/特写/俯拍通过画面表现"
palette: "艺术家色板——不限于物理色彩，可以是任何情绪色"
negative: "CG 渲染感、完美平滑渐变色、矢量图形的机械感"
```

---

## 5. 2D 扁平插画风格

```yaml
style: 2D扁平插画
lighting:
  primary: "无真实光源——纯平涂色块"
  secondary: "可能使用渐变平面叠出层次"
  shadow: "硬边投影或省略阴影"
  mood: "现代、简洁、设计感强"
technique:
  line: "均匀粗细的矢量线条或无外轮廓线"
  color: "平涂纯色块，有限的配色板"
  character: "几何化造型，简化五官"
  background: "扁平分层，前景/中景/后景纯色区别"
lens: "平面构图——通过元素大小和位置表达空间"
palette: "4-8 种颜色构成，高饱和度/低饱和度均可"
negative: "写实光影、渐变体积感、复杂纹理"
```

---

## 6. 日系动画风格

```yaml
style: 日系动画
lighting:
  primary: "日系赛璐珞光影——明确的高光/中间调/阴影二层或三层切分"
  secondary: "环境光用半透明色片叠加"
  ambient: "冷暖对比——暖色室内/冷色室外"
  mood: "日式动画电影质感（新海诚/吉卜力/京都动画等参照）"
technique:
  line: "精细的黑色或深色手绘线条，轮廓清晰"
  color: "赛璐珞着色——色彩明亮、干净、层次分明"
  eye: "日系特色眼睛——多层高光、虹膜细节、情感表达核心"
  background: "高精度美术背景——可与角色略有风格差异（更写实）"
  effects: "粒子特效——樱花/雪花/光点/流线"
lens: "日系动画式镜头——倾斜构图、大广角特写、天空留白"
palette: "清澈——蓝白/粉紫/暖金/翠绿"
negative: "写实皮肤、欧美卡通比例、灰暗色调"
```

---

## 7. 国风动画风格

```yaml
style: 国风动画
lighting:
  primary: "中国画散点透视光影——非单一光源"
  secondary: "留白为光，墨色为影"
  mood: "东方美学——写意、留白、意境大于写实"
technique:
  line: "水墨线条或工笔白描——铁线描/兰叶描"
  color: "水墨渲染 / 工笔重彩 / 敦煌壁画色系"
  character: "中国传统造型——服饰/发型/配饰考究，身段优雅"
  background: "山水画、界画楼阁、云气纹、水纹"
  effects: "墨迹飞溅、云气流转、花瓣飘落、水墨转场"
lens: "长卷式构图或立轴式构图"
palette: "朱砂红 / 石青 / 藤黄 / 墨色五彩（焦浓重淡清）"
negative: "西方透视法、PBR 材质、霓虹光效"
```

---

## 8. 欧美卡通风格

```yaml
style: 欧美卡通
lighting:
  primary: "戏剧化高对比度布光"
  secondary: "明确的投影——硬边或软边根据风格"
  mood: "夸张、弹性、幽默或冒险"
technique:
  line: "粗轮廓线 + 变化线宽，线条本身有表现力"
  color: "鲜艳饱和色，冷暖对比强烈"
  character: "夸张比例——大头/大手/细腿，弹性形变（挤压与拉伸）"
  motion: "夸张的预备动作和跟随动作，弹性十足"
  background: "风格化环境——可扁平可有一定体积感"
lens: "夸张透视——大仰角/大俯角/鱼眼变形"
palette: "三原色为主——红黄蓝高饱和"
negative: "写实比例、日系萌系、灰暗色调"
```

---

## 9. 绘本动画风格

```yaml
style: 绘本动画
lighting:
  primary: "柔和漫射光，如透过纸面的暖光"
  secondary: "无硬阴影"
  mood: "温馨、诗意、适合睡前故事"
technique:
  line: "柔和铅笔线或蜡笔质感线条"
  color: "彩铅/蜡笔/粉彩/水彩混合媒材质感"
  texture: "纸张纹理可见——水彩纸/素描纸/牛皮纸"
  character: "童趣造型，圆润可爱，表情丰富但不夸张"
  background: "手绘感场景——笔触方向可见、色彩轻微溢出轮廓"
lens: "平面构图为主，偶有轻微推拉"
palette: "温暖——柔粉/淡蓝/暖黄/草绿/奶油白"
negative: "锐利边缘、纯黑阴影、写实比例、CG 渲染"
```

---

## 10. 定格动画风格

```yaml
style: 定格动画
lighting:
  primary: "棚拍布光——小型LED或钨丝灯，模拟实物拍摄"
  secondary: "辅助光消除拍摄时的投影"
  mood: "手工温度、材质真实感、每一帧的劳动痕迹"
technique:
  material: "木偶/黏土/纸片/毛毡/乐高等实物材质"
  texture: "实物表面纹理——织物经纬、木纹、金属反光、黏土指纹"
  motion: "12-15fps，保留帧间微跳的拙趣"
  environment: "实物搭建的微缩场景——纸板建筑/泡沫山石/棉花云烟"
lens:
  type: "微距镜头或实物拍摄模拟"
  dof: "微缩场景特有大景深或极端浅景深（倾斜移轴效果）"
palette: "实物材质本色，不后期调色偏移"
negative: "完美流畅运动、CG 渲染、数字特效、矢量图形"
```

