## 6. 真人霓虹赛博风格

```yaml
style: 真人霓虹赛博朋克
lighting:
  primary: "多色霓虹灯管（品红/青蓝/明黄）从画面各处射入"
  secondary: "LED 屏幕和全息投影的漫射光"
  ambient: "湿雾弥漫，光线在水汽中形成体积光束"
  mood: "高科技低生活，繁华与衰败并存，颓废美学"
lens:
  type: "35mm 或 50mm，宽幅变形镜头"
  aperture: "f/1.8-f/2.8"
  dof: "中浅景深，夜景散景呈霓虹光斑"
  resolution: "8K"
texture:
  skin: "汗湿反光，皮肤被霓虹染成粉紫/青蓝色调"
  fabric: "合成材料（PVC/乳胶/机能面料）反光，透明雨衣"
  environment: "湿滑街道反射霓虹、全息广告牌、裸露管道和电缆"
palette:
  primary: "品红 #FF0040"
  secondary: "青蓝 #00D4FF"
  accent: "明黄 #FFD700 / 墨绿 / 深紫"
negative: "自然日光、田园风光、温暖色调、干净整洁的场景"
```

