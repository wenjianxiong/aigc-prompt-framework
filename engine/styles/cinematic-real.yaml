## 8. 真人超现实电影风格

```yaml
style: 真人超现实电影
lighting:
  primary: "非自然光源逻辑，光线可违反物理"
  secondary: "物体自发光、漂浮光球、光瀑倒流"
  ambient: "梦境逻辑——天空可以是任何颜色"
  mood: "诡异、梦幻、颠覆现实物理法则"
lens:
  type: "广角变形或鱼眼，扭曲透视"
  aperture: "f/2.0-f/5.6"
  dof: "深景深或极端浅景深，根据梦境需求切换"
  resolution: "8K"
texture:
  skin: "可异化——瓷器质感、液态金属、半透明、裂痕"
  fabric: "违反重力的飘浮布料、无限延伸的纹理"
  environment: "埃舍尔式空间、无限循环楼梯、漂浮岛屿、倒置城市"
palette:
  primary: "超饱和或彻底去饱和，根据梦境基调"
  secondary: "不限于物理色彩——紫色天空/金色海洋/黑白人物+彩色环境"
  accent: "荧光色点缀"
negative: "物理正确、日常场景、常规透视、自然色彩平衡"
```

