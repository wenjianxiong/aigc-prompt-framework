## 风格速选决策树

```
你的项目是什么类型？
├── 现实题材
│   ├── 追求艺术感 → 1.电影感写实
│   ├── 追求真实感 → 2.自然主义纪实
│   └── 产品/品牌 → 3.商业广告质感
├── 悬疑/犯罪
│   ├── 现代惊悚 → 4.低调光悬疑
│   └── 复古犯罪 → 5.黑色电影
├── 科幻/未来
│   └── 赛博朋克 → 6.霓虹赛博
├── 怀旧/年代
│   └── 70-90年代感 → 7.复古胶片
└── 梦境/实验
    └── 打破规则 → 8.超现实电影
```
