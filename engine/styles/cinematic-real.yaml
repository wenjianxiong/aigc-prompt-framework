# 🧱 风格引擎 — 真人电影类风格预设（8种）

每个风格预设包含：光影方案、镜头规格、质感描述、色彩板。
使用时直接复制参数块注入 Seedance / Image2 提示词。

---

## 1. 真人电影感写实风格

```yaml
style: 真人电影感写实
lighting:
  primary: "45° 暖金主光源，柔和自然散射"
  secondary: "环境反射补光，避免死黑"
  ambient: "自然日光或暖色室内光"
  mood: "电影级明暗过渡，柔和阴影，不死硬"
lens:
  type: "85mm 变形宽银幕"
  aperture: "f/1.8"
  dof: "浅景深，焦点锐利，焦外柔美"
  resolution: "8K 超清"
texture:
  skin: "超写实人体皮肤肌理，精细毛孔，面部细软绒毛，次表面散射"
  fabric: "天然面料纹理可见（棉麻丝毛）"
  environment: "自然材质老化痕迹（木纹/石纹/锈迹）"
palette:
  primary: "自然肤色 / 中性灰"
  secondary: "环境固有色"
  accent: "道具或服装点缀色"
negative: "模糊、低画质、面部变形、多余手指、水印、过度锐化、塑料感皮肤"
```

---

## 2. 真人自然主义纪实风格

```yaml
style: 真人自然主义纪实
lighting:
  primary: "自然光为主，避免人工补光痕迹"
  secondary: "环境漫反射"
  ambient: "真实场景光线（阴天柔光/窗光/街灯）"
  mood: "不修饰的粗粝感，保留高光过曝和暗部噪点"
lens:
  type: "35mm 或 50mm 纪实镜头"
  aperture: "f/2.8-f/4"
  dof: "中景深，环境信息保留"
  resolution: "4K-8K，轻微胶片颗粒"
texture:
  skin: "真实皮肤质感，不磨皮，保留瑕疵、毛孔、细纹"
  fabric: "日常衣物自然褶皱和磨损"
  environment: "真实环境不做美化处理"
palette:
  primary: "环境主色调直出"
  secondary: "不进行后期调色偏移"
  accent: "自然色彩"
negative: "过度磨皮、糖水色调、影楼打光、塑料感、不自然的色彩饱和度"
```

---

## 3. 真人商业广告质感

```yaml
style: 真人商业广告质感
lighting:
  primary: "多灯精准布光，产品/人物高光区锐利明亮"
  secondary: "精确控光消除多余阴影"
  ambient: "干净的高调或低调棚拍光"
  mood: "无瑕、高级、精致，每一道光都有意图"
lens:
  type: "100mm 微距或 85mm 人像镜"
  aperture: "f/1.4-f/2.8"
  dof: "极浅景深，背景奶油化开"
  resolution: "8K 超清，零噪点"
texture:
  skin: "专业级修图质感，无瑕但保留皮肤纹理走向"
  fabric: "高定面料光泽与纹理，丝绸/皮革/精纺羊毛"
  product: "无尘无痕，金属高光笔直，玻璃透亮无折射畸变"
palette:
  primary: "品牌主色或产品色"
  secondary: "高级灰/白/黑背景"
  accent: "金属光泽点缀（金/银/玫瑰金）"
negative: "噪点、灰尘、不自然的色彩偏移、曝光不准、边缘模糊"
```

---

## 4. 真人低调光悬疑风格

```yaml
style: 真人低调光悬疑
lighting:
  primary: "单一硬光源，方向明确（窗光/手电/路灯）"
  secondary: "几乎无补光，大面暗部"
  ambient: "极弱环境光，暗部细节勉强可辨"
  mood: "压抑、紧张、未知，阴影吞噬大部分画面"
lens:
  type: "50mm 或 85mm"
  aperture: "f/1.4-f/2.0"
  dof: "浅景深，焦点孤立主体于黑暗中"
  resolution: "8K，暗部保留纹理不糊成一片"
texture:
  skin: "汗水反光、惊恐时的毛孔收缩、局部冷光勾勒轮廓"
  fabric: "深色衣物融入暗部"
  environment: "潮湿反光表面、灰尘在光束中悬浮"
palette:
  primary: "深黑 / 深灰蓝"
  secondary: "冷白或暖黄单点光"
  accent: "危险红 / 幽绿 / 警示橙（极少使用）"
negative: "画面过亮、均匀布光、清晰可见的面部、明亮背景"
```

