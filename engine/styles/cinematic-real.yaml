## 5. 真人黑色电影风格

```yaml
style: 真人黑色电影
lighting:
  primary: "硬质单光源，百叶窗投影或街灯光束"
  secondary: "无"
  ambient: "极暗，烟雾弥漫捕捉光束体积"
  mood: "宿命感、道德灰色地带、1940s好莱坞犯罪片美学"
lens:
  type: "50mm 或 35mm 黑白时代镜头质感"
  aperture: "f/2.0-f/2.8"
  dof: "中浅景深"
  resolution: "4K-8K，添加细微胶片颗粒"
texture:
  skin: "高对比度，亮部死白、暗部死黑，少量灰度过渡"
  fabric: "风衣、礼帽、西装廓形，面料质感被明暗切割"
  environment: "湿漉漉的街道、霓虹倒影、烟雾缭绕的室内"
palette:
  primary: "黑白为主，极少量单色点缀"
  secondary: "深灰到纯黑渐变"
  accent: "危险红唇 / 霓虹蓝 / 琥珀酒色（非常克制）"
negative: "彩色、柔和布光、明亮白天外景、过度锐利"
```

