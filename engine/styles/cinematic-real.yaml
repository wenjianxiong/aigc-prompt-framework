## 7. 真人复古胶片风格

```yaml
style: 真人复古胶片
lighting:
  primary: "自然光或钨丝灯暖光"
  secondary: "轻微漏光效果"
  ambient: "暖黄或褪色基调"
  mood: "怀旧、温暖、时光感，1970-90年代家庭影像质感"
lens:
  type: "50mm 或 35mm vintage lens"
  aperture: "f/2.8-f/4"
  dof: "中景深"
  resolution: "4K + 胶片颗粒 + 轻微色散/紫边"
texture:
  overall: "可见胶片颗粒，轻微划痕和灰尘斑点，边缘暗角"
  skin: "暖调肤色，轻微过曝倾向"
  fabric: "复古面料图案（格纹/碎花/灯芯绒）"
  environment: "旧家具、褪色墙纸、日光漂白的窗帘"
palette:
  primary: "暖黄 / 褪色橙 / 奶油白"
  secondary: "橄榄绿 / 棕褐"
  accent: "柯达 Portra 400 调色板"
negative: "过度锐利、数字感画面、冷色调、完美无瑕"
```

