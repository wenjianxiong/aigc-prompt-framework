# 🧱 风格引擎 — 光影方案库（12种）

每个方案可直接作为 Seedance / Image2 提示词的光影描述块注入。

---

## 1. 伦勃朗布光

```yaml
id: rembrandt
name: 伦勃朗布光
description: 经典三角光——主光从45°斜上方照射，在暗侧脸颊形成倒三角形亮区
usage: "45° 暖金主光源从画面右上方照射，在主体面部暗侧形成标志性三角光斑。辅助光极弱，强烈明暗对比。电影级暗部压暗处理，保留暗部纹理。"
best_for: [仙侠, 古装, 悬疑, 人物肖像]
```

---

## 2. 暮光/黄金时刻

```yaml
id: golden-hour
name: 黄金时刻光
description: 日落前最后一小时的暖金色低角度阳光
usage: "低角度暖金色夕阳光穿透大气层，色温约3000K。长阴影拖曳于地面。空气中的尘霾形成金色体积光束。主体正面被暖光包裹，轮廓线微微发亮。"
best_for: [废土, 西部, 浪漫, 回忆闪回]
```

---

## 3. 蓝调时刻

```yaml
id: blue-hour
name: 蓝调时刻光
description: 日落后/日出前的深蓝天空漫射光
usage: "天空呈深钴蓝色调，所有物体笼罩在冷蓝色漫射光中。城市灯光/篝火/窗光在蓝色基调中形成暖色点缀。无硬阴影，柔和均匀的环境光。"
best_for: [赛博朋克, 悬疑, 孤独感, 城市夜景]
```

---

## 4. 阴天柔光

```yaml
id: overcast
name: 阴天柔光
description: 厚云层形成天然柔光箱，无方向性
usage: "阴天厚云层形成天然柔光箱，光线从整个天空均匀漫射而下。无明确阴影方向，所有物体被包裹在柔和的灰调光中。色彩饱和度自然偏高，细节全部可见。"
best_for: [自然主义纪实, 伤感, 内省, 日常场景]
```

---

## 5. 硬日光

```yaml
id: hard-sunlight
name: 硬日光
description: 正午强烈直射阳光，高反差
usage: "正午强烈的直射阳光从头顶照射，形成极短极黑的阴影。高光区刺眼过曝，暗部漆黑。空气热浪扭曲远景。皮肤高光点锐利如钻石切面，暗部压到近乎死黑。"
best_for: [西部, 沙漠, 废土, 紧张对峙]
```

---

## 6. 赛博霓虹

```yaml
id: cyber-neon
name: 赛博霓虹光
description: 多色霓虹灯管从各方向照射，雨雾中形成体积光束
usage: "品红和青蓝色霓虹灯管从画面各处射入，在潮湿的雾气中形成交叉的体积光束。LED 广告牌的频闪光在皮肤上投下不断变换的色彩。地面水洼倒映破碎的霓虹色块。整体暗调，亮部被霓虹切成碎片。"
best_for: [赛博朋克, 科幻, 夜店, 未来都市]
```

---

## 7. 烛光/火光

```yaml
id: firelight
name: 烛光/火光
description: 单一暖色小火源，强烈明暗，光摇曳不定
usage: "单一烛光/篝火/油灯作为唯一光源，色温约1800K。光线摇曳不定，在墙壁和面部投下跳动的阴影。主体靠近火源一侧被暖橙色照亮，远离侧沉入黑暗。烟雾在火光中形成柔软的体积光。"
best_for: [古装, 恐怖, 温馨室内, 中世纪奇幻]
```

---

## 8. 月光

```yaml
id: moonlight
name: 月光
description: 冷蓝色月光，低照度，长曝光质感
usage: "满月冷蓝色光线从夜空洒落，色温约8000K。月光为唯一光源，场景大部分沉入深暗。月光的反射在水面/雪地/浅色表面上形成银色高光。长曝光般的静谧感，暗部细节极少，以剪影和轮廓为主。"
best_for: [恐怖, 魔幻, 孤独, 夜景外景]
```

---

## 9. 手术灯/审讯灯

```yaml
id: clinical
name: 无影冷白光
description: 极冷色扁平光，无阴影，令人不适的清晰
usage: "多角度冷白荧光灯，色温约6500K，消除所有阴影。极度均匀的照明让每一处细节无所遁形。皮肤的每一处瑕疵、皱纹、毛孔暴力展示。实验室/手术室/审讯室的冷酷质感。"
best_for: [科幻恐怖, 心理惊悚, 实验室, 审讯场景]
```

---

## 10. 舞台追光

```yaml
id: spotlight
name: 舞台追光
description: 单一聚光灯，主体被光柱孤立于黑暗中
usage: "一束强烈的聚光灯从上方垂直打下，将主体孤立于光圈内。光柱边缘锐利，圈外是纯粹的黑暗。主体在光柱中如标本般被展示，尘埃在光束中悬浮起舞。戏剧舞台感，不真实的孤独。"
best_for: [戏剧化时刻, 独白, 梦境, 超现实]
```

---

## 11. 逆光剪影

```yaml
id: silhouette
name: 逆光剪影
description: 强光源在主体背后，主体呈现为剪影
usage: "强光源（落日/爆炸/窗光）位于主体正后方。主体呈现为深邃的剪影，轮廓线条被逆光勾勒出极细的金色或白色高光边。面部不可见，情绪完全通过身体语言传达。背景的光源本身过曝，形成圣洁或毁灭性的视觉冲击。"
best_for: [英雄登场, 离别, 悬念揭示, 史诗感]
```

---

## 12. 废土苍凉光

```yaml
id: wasteland
name: 废土苍凉光
description: 核冬天/末日黄昏特有的昏黄脏光 + 锈铁冷青反射
usage: "末日黄昏光以45°穿透浓厚的尘霾，色温偏暖橙但被灰黄色大气散射柔和。光线在废墟混凝土和锈蚀钢筋间投下极长的阴影。锈铁表面反射出冷青色的辅光，在暗部形成微妙的色彩对比。空气中悬浮大量灰尘颗粒，形成可见的体积光柱。整体色调偏黄褐，夹杂锈铁和氧化铜的冷色点缀。"
best_for: [废土, 末世, 后末日, 科幻战争]
```

