## 镜头-场景匹配建议

| 场景类型 | 推荐镜头 | 运动方式 |
|---------|---------|---------|
| 人物出场 | 85mm 变形宽银幕 | 缓慢推进 / 固定 |
| 对话 | 85mm / 35mm | 固定 + 微摇 |
| 动作/战斗 | 手持跟拍 / 广角 | 跟拍 + 甩镜 |
| 大场面 | 广角 / 航拍 | 摇臂升降 / 平移 |
| 道具展示 | 100mm 微距 | 缓慢环绕 |
| 心理活动 | 鱼眼 / 85mm | 荷兰角 + 推进 |
| 转场 | 航拍 | 平移甩镜 |
| 追逐 | 手持跟拍 | 剧烈跟拍 + 急摇 |
