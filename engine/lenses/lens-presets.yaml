## 镜头运动描述模板

```yaml
camera_movements:
  push: "镜头缓慢向前推进至面部特写"
  pull: "镜头缓慢拉远至全景"
  pan_left: "镜头从左向右水平平移"
  pan_right: "镜头从右向左水平平移"
  tilt_up: "镜头微微向上摇起"
  tilt_down: "镜头向下俯摇"
  track: "镜头跟随角色平行移动"
  dolly: "镜头跟随角色向前推进/拉远"
  crane_up: "镜头垂直上升（摇臂升起）"
  crane_down: "镜头垂直下降（摇臂降下）"
  orbit: "镜头围绕主体做弧形运动"
  static: "固定机位，静止不动"
  dutch: "荷兰角倾斜构图，增加不安感"
  whip_pan: "快速甩镜转场——从A点急速甩到B点"
```

