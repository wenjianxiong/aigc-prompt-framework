# 🧱 风格引擎 — 镜头规格库（7种）

每个规格包含完整的 Seedance / Image2 可注入参数块。

---

## 1. 85mm 变形宽银幕（电影人像）

```yaml
id: 85mm-anamorphic
name: 85mm 变形宽银幕
type: 定焦中长焦
description: 电影级人像镜头，压缩空间感，椭圆形散景，标志性水平光晕
inject: "85mm 变形宽银幕镜头，浅景深，光圈 f/1.8，焦点锐利焦外奶油般柔化，椭圆形散景光斑。8K 超清分辨率，原生实拍原片画质。"
best_for: [人物特写, 中景叙事, 情感表达, 仙侠/古装/废土]
```

---

## 2. 35mm 纪实镜头

```yaml
id: 35mm-documentary
name: 35mm 纪实镜头
type: 定焦小广角
description: 接近人眼视角，记录真实感，环境信息充足
inject: "35mm 纪实镜头，中景深 f/2.8-f/4，接近人眼自然视角。画面容纳更多环境信息，主体与场景关系清晰。轻微桶形畸变增加现场感。4K-8K，允许轻微噪点增加真实感。"
best_for: [自然主义纪实, 街道, 日常生活, 纪录片风格]
```

---

## 3. 14-24mm 广角

```yaml
id: wide-angle
name: 超广角
type: 变焦广角
description: 夸张透视，纵深拉伸，大景深
inject: "14-24mm 超广角镜头，大景深 f/5.6-f/8。夸张的透视变形——前景物体放大、远景急剧收缩。适合强调空间的巨大或压迫感。画面边缘轻微拉伸变形，增加视觉张力。8K。"
best_for: [建筑, 废墟, 大场面, 仰拍/俯拍, 空间压迫感]
```

---

## 4. 100mm 微距

```yaml
id: macro
name: 100mm 微距
type: 定焦微距
description: 1:1 放大率，极致细节，极浅景深
inject: "100mm 微距镜头，1:1 放大率。焦点处细节纤毫毕现——皮肤毛孔、织物纹理、金属划痕。焦点外急剧虚化，景深极浅（f/2.8 时景深仅数毫米）。8K超清，零噪点。"
best_for: [道具特写, 眼睛特写, 材质展示, 武器细节, 伤口/伤疤]
```

---

## 5. 航拍/俯瞰

```yaml
id: aerial
name: 航拍俯瞰
type: 无人机视角
description: 上帝视角，场景全貌，人物渺小
inject: "航拍俯瞰视角，无人机搭载广角镜头从数百米高空垂直向下或大角度俯拍。大地如地图般展开，人物缩小为点。大景深，全部清晰。8K。"
best_for: [场景建立, 转场, 史诗感, 追踪运动]
```

---

## 6. 手持跟拍

```yaml
id: handheld
name: 手持跟拍
type: 手持摄影
description: 轻微晃动，临场感，动作场景
inject: "手持跟拍风格，摄影机跟随主体运动轻微晃动。呼吸感的节奏变化——静止时轻微浮动，运动时振幅加大。快速摇摄时产生运动模糊。镜头贴近主体，增强临场感和紧张感。"
best_for: [动作场景, 追逐, 战斗, 纪录片, POV]
```

---

## 7. 鱼眼

```yaml
id: fisheye
name: 鱼眼
type: 超广角定焦
description: 极端180°视角，球形畸变，迷幻/不安感
inject: "8-15mm 鱼眼镜头，180° 视野。画面球形畸变——直线变成弧线，中心放大边缘压缩。适合表现角色精神状态异常、迷幻体验或极端运动场景（滑板/极限运动POV）。8K。"
best_for: [迷幻, 心理惊悚, 极限运动, 醉酒/中毒POV, 实验影像]
```

