## 特殊质感

### 冰/霜
```
冰面光滑如玻璃但内部有天然裂纹和气泡冻结其中。
边缘因融化而变得圆润湿润，水滴沿冰柱尖端滑落。
冰面在光线下呈现微妙的蓝绿色调（光线在冰晶内部散射）。
霜花在玻璃表面呈蕨类植物状结晶，边缘锐利呈六角对称。
```

### 火焰/热浪
```
火焰核心呈明亮的橙白，向外过渡为橙黄→橙红→暗红。
火焰边缘呈半透明，可见背景物体在热浪中扭曲变形。
火焰舔舐物体表面时，接触点发出耀眼光芒，
被灼烧的物体表面碳化变黑，边缘有暗红色余烬。
炽热空气上升形成可见的透明热浪柱。
```

### 烟雾/尘雾
```
浓烟在静止空气中缓慢上升，呈絮状团块而非均匀扩散。
烟雾内部可见漩涡和涡流，边缘逐渐稀薄融入空气。
光线穿透烟雾时形成清晰的光束体积（丁达尔效应）。
灰尘在光束中如微小的金色颗粒悬浮舞动。
远处的物体因大气散射而对比度降低，呈现灰蓝色调。
```

### 血液/体液
```
新鲜血液呈深红，在皮肤表面有表面张力形成的弧面。
血液沿重力方向缓缓流淌，边缘呈锯齿状扩散。
干涸的血液颜色变深呈暗棕近黑色，表面形成脆性裂纹。
暗处血液呈墨黑，被光照亮处呈宝石红半透明。
```
