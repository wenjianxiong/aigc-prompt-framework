## 自然环境质感

### 混凝土/废墟
```
钢筋混凝土断裂面——裸露的锈蚀钢筋从灰色混凝土中刺出，
钢筋表面覆满片状锈层。混凝土断口粗糙，可见沙石骨料截面。
表面有风化裂纹呈网状延伸，苔藓在阴面角落呈墨绿色蔓延。
碎混凝土块散落地面，边缘锐利，表面附着一层细灰。
```

### 沙石/荒漠
```
细沙表面有风形成的波纹纹理（沙波纹），间距约5-10cm。
干沙颜色偏浅棕黄，湿沙偏深棕。
碎石半埋于沙中，迎风面被风沙打磨光滑，背风面粗糙。
远处热气蒸腾形成空气扭曲，远景在热浪中轻微变形。
```

### 植被
```
热带阔叶表面有蜡质光泽，叶脉呈浮雕状凸起。
老叶边缘有虫咬缺口和枯黄焦边。
苔藓如绿色天鹅绒覆盖在潮湿的树干北侧，手指按压会留下凹痕。
蕨类植物卷曲的新芽（提琴头）覆盖银白色细毛。
```

### 水面
```
静止水面如镜面反射天空和岸景。微风拂过时表面泛起细微波纹——
波纹间距均匀，将倒影切割成碎片。水底可见——
清澈水体中光线折射在水底沙石上投下动态光网（焦散）。
水面漂浮着零星落叶和花粉，形成微小的表面张力凹坑。
```

