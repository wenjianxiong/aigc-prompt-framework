## 金属质感

### 抛光钢
```
高碳钢表面镜面抛光，反射环境如一面扭曲的镜子。
高光区呈锐利的纯白条带，暗部反射深灰环境。
表面无瑕，无划痕，冷冽锋利。
```

### 战损金属
```
钢面有横向拉丝纹理和数道战损划痕——深划痕可见金属本色，
浅划痕只在表面氧化层留下白线。刀刃处有细微崩口，
护手处有锈迹斑点，边缘因长期使用而圆润磨损。
```

### 锈蚀铁
```
铸铁表面覆满橘棕色锈层，锈层不均匀——厚处呈深棕近黑，
薄处可见铁灰色基底。锈层表面粗糙起泡，触摸会有碎屑脱落。
雨水冲刷处锈色偏橙，干燥处偏褐。边缘因锈蚀而变薄变脆。
```

### 钨钢/工业合金
```
钨钢部件呈深灰色，表面有精密加工的环形刀纹。
哑光质感——吸收光线而非反射，仅有极细微的金属光泽。
碳纤维编织纹理呈45°交叉格纹，在光线变换角度时呈现微妙的虹彩。
散热片边缘倒角处有高光，片间缝隙均匀。
```

---

## 布料质感

### 丝绸
```
桑蚕丝面料在光线下泛出柔和的珍珠光泽。
布面光滑如水，褶皱处高光锐利、暗部深邃。
悬垂性极好，自然垂落形成优美的弧线。
轻纱半透明层叠——下层花纹透过上层薄纱隐约可见。
```

### 粗麻/帆布
```
未漂白的粗麻纤维纹理清晰可见，经纬线不规则交叠。
表面有天然的亚麻结和微细毛刺。硬度适中——
折叠线笔直而非圆弧，边缘有毛边。
长时间使用区域颜色变浅，折叠处纤维疲劳起毛。
```

### 皮革
```
头层牛皮表面有天然的毛孔纹理和微细皱纹。
光泽柔和——非镜面反射而是温暖的朦胧光泽。
使用过的皮革在折弯处有永久性褶皱和包浆——
深色沉淀在纹路凹陷处，凸起处因摩擦而光亮。
边缘切面呈浅棕色，可见皮纤维结构。
```

### 战术面料
```
黑色 Cordura 尼龙面料，表面呈细密的蜂窝状防撕裂格纹。
哑光，不反光。缝线处有加固双车线，线迹笔直均匀。
长时间使用的膝盖和肘部有自然磨白和起毛。
MOLLE 织带系统——横向织带间距均匀，插扣为哑光黑色工程塑料。
```

