# 🧱 风格引擎 — 质感描述库

按材质分类的 Seedance / Image2 可注入质感描述。使用时直接复制对应条目。

---

## 皮肤质感

### 超写实健康皮肤
```
超写实人体皮肤肌理，贴合光线方向的超精细毛孔细节，
面部细软绒毛在逆光中呈现金色轮廓，脸颊细微毛细血管自然泛红，
高精度次表面散射，光线穿透皮肤表层后在真皮层漫射，
皮肤通透真实，角质层微细纹理可见。
```

### 战损/废土皮肤
```
汗水与油污混合的光泽覆在皮肤表面，汗珠沿毛孔边缘聚集。
面部因剧烈运动泛红，左眉骨上方一道已结痂的浅表擦伤，
暗红色血痂边缘微微翘起。右前臂有一块褪色淤青（黄绿色过渡）。
超写实毛孔细节，污垢嵌入皮肤纹理凹陷处。
```

### 湿皮肤
```
皮肤表面覆盖一层薄水膜，高光点锐利如碎钻。
水珠沿面部轮廓滑落，在锁骨凹陷处汇聚。
潮湿的皮肤反射环境光——冷光下呈蓝白，暖光下呈金铜色。
湿润的睫毛聚拢成簇，水珠挂在发梢。
```

### 老化皮肤
```
岁月雕刻的皮肤——眼角鱼尾纹向外辐射，额头的横向细纹，
法令纹从鼻翼延伸至嘴角。手背皮肤变薄，淡青色静脉隐约可见。
老年斑零星分布在颧骨和手背，皮肤弹性下降带来的细微松弛。
但仍保留温润的生命光泽，不是枯槁。
```

