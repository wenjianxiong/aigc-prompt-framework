<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIGC 提示词工坊 v1.0</title>
<style>
:root {
  --bg: #0d1117;
  --card: #161b22;
  --border: #30363d;
  --text: #c9d1d9;
  --dim: #8b949e;
  --accent: #c9a44b;
  --accent2: #58a6ff;
  --green: #3fb950;
  --red: #f85149;
  --orange: #d2991d;
  --purple: #a371f7;
}
* { box-sizing:border-box; margin:0; padding:0 }
body { background:var(--bg); color:var(--text); font:14px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; min-height:100vh }
a { color:var(--accent2) }
header { background:var(--card); border-bottom:1px solid var(--border); padding:12px 24px; display:flex; align-items:center; gap:12px; position:sticky; top:0; z-index:10 }
.logo { font-size:20px; font-weight:700; color:var(--accent) }
.ver { font-size:11px; color:var(--dim); background:var(--border); padding:2px 8px; border-radius:10px }
.nav { display:flex; gap:4px; margin-left:auto }
.nav button { background:none; border:1px solid var(--border); color:var(--dim); padding:6px 16px; border-radius:6px; cursor:pointer; font-size:13px; transition:.15s }
.nav button.active { background:var(--accent2); border-color:var(--accent2); color:#fff }
.nav button:hover:not(.active) { color:var(--text); border-color:var(--text) }
main { max-width:1400px; margin:0 auto; padding:24px }
.step { margin-bottom:32px }
.step h3 { font-size:15px; color:var(--accent2); margin-bottom:12px; display:flex; align-items:center; gap:8px }
.step h3 .num { display:inline-flex; width:24px; height:24px; align-items:center; justify-content:center; background:var(--accent2); color:#fff; border-radius:12px; font-size:12px; font-weight:700 }
.cards { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:10px }
.card { background:var(--card); border:2px solid var(--border); border-radius:10px; padding:16px; cursor:pointer; transition:all .2s; position:relative }
.card:hover { border-color:var(--accent2); transform:translateY(-1px) }
.card.selected { border-color:var(--green); background:#0d2b1a }
.card .name { font-weight:600; font-size:14px; margin-bottom:4px }
.card .desc { font-size:12px; color:var(--dim); line-height:1.5 }
.card .tag { display:inline-block; padding:1px 8px; border-radius:4px; font-size:11px; margin-top:6px }
.card .tag.style { background:#1a1a2e; color:var(--accent) }
.card .tag.light { background:#2e1a1a; color:var(--orange) }
.card .tag.lens { background:#1a2e1a; color:var(--green) }
.card .check { display:none; position:absolute; top:8px; right:12px; font-size:18px }
.card.selected .check { display:block; color:var(--green) }

/* Form */
.form-group { margin-bottom:16px }
.form-group label { display:block; font-size:13px; font-weight:600; color:var(--accent2); margin-bottom:6px }
.form-group textarea, .form-group input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:10px 14px; color:var(--text); font:inherit; resize:vertical; transition:.15s }
.form-group textarea:focus, .form-group input:focus { outline:none; border-color:var(--accent2) }
.form-group textarea { min-height:80px }
.form-group .hint { font-size:11px; color:var(--dim); margin-top:4px }

/* Output */
.output { background:var(--card); border:2px solid var(--accent); border-radius:12px; padding:24px; margin-top:24px }
.output h3 { color:var(--accent); margin-bottom:16px; font-size:16px }
.output pre { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:20px; font-size:13px; line-height:1.8; white-space:pre-wrap; word-break:break-word; overflow-x:auto; max-height:500px; overflow-y:auto }
.toolbar { display:flex; gap:10px; margin-top:16px; flex-wrap:wrap }
.btn { padding:10px 22px; border:none; border-radius:8px; font:600 13px inherit; cursor:pointer; transition:.15s }
.btn-copy { background:var(--green); color:#000 }
.btn-copy:hover { filter:brightness(1.15) }
.btn-reset { background:var(--border); color:var(--text) }
.btn-reset:hover { background:var(--dim) }
.btn-gh { background:transparent; border:1px solid var(--accent2); color:var(--accent2) }
.btn-gh:hover { background:rgba(88,166,255,0.1) }

/* Color swatch */
.swatches { display:flex; gap:6px; margin-top:8px }
.swatch { width:22px; height:22px; border-radius:4px; border:1px solid rgba(255,255,255,.1) }

/* Summary bar */
.summary { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px 18px; margin-bottom:24px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; font-size:13px }
.summary .sel { background:var(--bg); border:1px solid var(--border); padding:3px 10px; border-radius:6px; display:inline-flex; align-items:center; gap:4px }
.summary .sel .dot { width:8px; height:8px; border-radius:4px }
.summary .empty { color:var(--dim); font-style:italic }

/* Tabs */
.tab { display:none }
.tab.active { display:block }

/* Responsive */
@media (max-width:768px) {
  .cards { grid-template-columns:1fr }
  header { padding:10px 16px }
  .logo { font-size:17px }
  main { padding:16px }
}
</style>
</head>
<body>

<header>
  <div class="logo">🎬 AIGC 提示词工坊</div>
  <span class="ver">v1.0</span>
  <div class="nav">
    <button id="btnTabEngine" class="active">⚙️ 选参</button>
    <button id="btnTabGenerate">✨ 生成</button>
  </div>
</header>

<main>

<!-- Summary Bar -->
<div class="summary" id="summary">
  <span class="empty" id="summaryText">👆 点击下方卡片选择参数</span>
</div>

<!-- Tab: Engine -->
<div class="tab active" id="tabEngine">

<!-- Step 1: 类型 -->
<div class="step">
  <h3><span class="num">1</span> 故事类型</h3>
  <div class="cards" id="genres"></div>
</div>

<!-- Step 2: 风格 -->
<div class="step">
  <h3><span class="num">2</span> 视觉风格</h3>
  <div class="cards" id="styles"></div>
</div>

<!-- Step 3: 光影 -->
<div class="step">
  <h3><span class="num">3</span> 光影方案</h3>
  <div class="cards" id="lightings"></div>
</div>

<!-- Step 4: 镜头 -->
<div class="step">
  <h3><span class="num">4</span> 镜头规格</h3>
  <div class="cards" id="lenses"></div>
</div>

<!-- Step 5: 质感 -->
<div class="step">
  <h3><span class="num">5</span> 质感描述</h3>
  <div class="cards" id="textures"></div>
</div>

</div><!-- /tabEngine -->

<!-- Tab: Generate -->
<div class="tab" id="tabGenerate">
  <div class="step">
    <h3><span class="num">6</span> 填写创作内容</h3>

    <div class="form-group">
      <label>主体描述</label>
      <input id="inSubject" placeholder="例：一位身穿青色道袍的年轻女修士，黑色长发及腰">
      <span class="hint">画面核心是谁/什么——外貌、服装、标志特征</span>
    </div>

    <div class="form-group">
      <label>动作描述</label>
      <input id="inAction" placeholder="例：她站在古庙汉白玉台阶前，双掌合十，体内爆发出金色罡气">
      <span class="hint">此时此刻正在发生什么——具体物理动作</span>
    </div>

    <div class="form-group">
      <label>场景描述</label>
      <input id="inScene" placeholder="例：深山古庙建筑群，汉白玉台阶通向大殿，殿内烛火摇曳">
      <span class="hint">在哪里——环境、时间、氛围</span>
    </div>

    <div class="form-group">
      <label>台词（可选）</label>
      <input id="inDialog" placeholder="例：一剑破万法。（冷冽，极轻）">
      <span class="hint">角色说的关键台词 + 语气。单句 ≤15字</span>
    </div>

    <div class="form-group">
      <label>@引用映射（可选）</label>
      <textarea id="inRefs" placeholder="例：&#10;@Image1: 女主三视图&#10;@Image2: 场景设定图&#10;@Image3: 道具参考"></textarea>
      <span class="hint">上传到 Seedance 的素材引用，格式：@Image1: 用途</span>
    </div>

    <div class="form-group">
      <label>负面提示词（可选追加，默认已有基础版）</label>
      <input id="inNegative" placeholder="例：3D渲染感、写实皮肤">
    </div>

    <button class="btn btn-copy" id="btnGenerate" style="font-size:16px;padding:14px 40px">🚀 生成提示词</button>
  </div>

  <div class="output" id="outputBox" style="display:none">
    <h3>📋 生成结果</h3>
    <pre id="outputText"></pre>
    <div class="toolbar">
      <button class="btn btn-copy" id="btnCopy">📋 一键复制</button>
      <button class="btn btn-reset" id="btnClear">🔄 清空全部</button>
    </div>
  </div>
</div><!-- /tabGenerate -->

</main>

// ====== STATE ======
let sel = { genre:null, style:null, lighting:null, lens:null, textures:[] };

// ====== RENDER ======
function renderCards(containerId, items, key, multi=false) {
  const el = document.getElementById(containerId);
  let html = "";
  for (const item of items) {
    let catTag = item.cat ? `<span class="tag style">${item.cat}</span>` : '';
    let swatchesHtml = '';
    if (item.colors) {
      swatchesHtml = '<div class="swatches">' + item.colors.map(c => `<div class="swatch" style="background:${c}"></div>`).join('') + '</div>';
    }
    const isSelected = multi ? (sel.textures||[]).includes(item.id) : sel[key] === item.id;
    html += `<div class="card${isSelected?' selected':''}" data-id="${item.id}" data-key="${key}"><div class="check">✓</div><div class="name">${item.name}</div><div class="desc">${item.desc}${swatchesHtml}</div>${catTag}</div>`;
  }
  el.innerHTML = html;
  el.querySelectorAll('.card').forEach(c => c.addEventListener('click', function() {
    const k = this.dataset.key, id = this.dataset.id;
    if (multi) {
      let arr = sel.textures || [];
      const idx = arr.indexOf(id);
      if (idx > -1) arr.splice(idx,1); else arr.push(id);
      sel.textures = arr;
    } else {
      sel[k] = (sel[k] === id ? null : id);
    }
    renderAll();
    updateSummary();
  }));
}

function renderAll() {
  renderCards("genres", genres, "genre");
  renderCards("styles", styles, "style");
  renderCards("lightings", lightings, "lighting");
  renderCards("lenses", lenses, "lens");
  renderCards("textures", textures, "textures", true);
}

// ====== SUMMARY ======
function findItem(arr, id) { return arr.find(x=>x.id===id)||null }
function updateSummary() {
  const parts = [];
  if (sel.genre) { const g = findItem(genres, sel.genre); parts.push(`<span class="sel"><span class="dot" style="background:var(--purple)"></span>${g.name}</span>`); }
  if (sel.style) { const s = findItem(styles, sel.style); parts.push(`<span class="sel"><span class="dot" style="background:var(--accent)"></span>${s.name} <span style="font-size:10px;color:var(--dim)">${s.cat}</span></span>`); }
  if (sel.lighting) { const l = findItem(lightings, sel.lighting); parts.push(`<span class="sel"><span class="dot" style="background:var(--orange)"></span>${l.name}</span>`); }
  if (sel.lens) { const ln = findItem(lenses, sel.lens); parts.push(`<span class="sel"><span class="dot" style="background:var(--green)"></span>${ln.name}</span>`); }
  if (sel.textures && sel.textures.length > 0) {
    parts.push(`<span class="sel"><span class="dot" style="background:var(--accent2)"></span>${sel.textures.length}种质感</span>`);
  }
  document.getElementById("summary").innerHTML = parts.length ? parts.join('') : '<span class="empty">👆 点击下方卡片选择参数</span>';
}

// ====== GENERATE ======
function generate() {
  const subj = document.getElementById("inSubject").value.trim();
  const action = document.getElementById("inAction").value.trim();
  const scene = document.getElementById("inScene").value.trim();
  const dialog = document.getElementById("inDialog").value.trim();
  const refs = document.getElementById("inRefs").value.trim();
  const extraNeg = document.getElementById("inNegative").value.trim();

  if (!subj && !action && !scene) {
    alert("至少填写主体描述、动作描述或场景描述中的一个");
    return;
  }

  const s = findItem(styles, sel.style);
  const l = findItem(lightings, sel.lighting);
  const ln = findItem(lenses, sel.lens);

  let parts = [];

  // @ references
  if (refs) {
    parts.push("/* 📎 素材引用 */");
    parts.push(refs);
    parts.push("");
  }

  parts.push("/* 🎬 Seedance 2.0 提示词 */");
  parts.push("");

  // Subject + @Reference
  let mainLine = subj;
  if (refs && refs.includes("@Image1")) mainLine += "（@Image1 角色参考）";
  parts.push(mainLine + "，");

  // Action
  if (action) parts.push(action + "。");

  // Scene
  if (scene) {
    if (refs && refs.includes("@Image2")) parts.push(`场景：${scene}（@Image2 场景参考）。`);
    else parts.push(`场景：${scene}。`);
  }

  // Lens
  if (ln) parts.push(ln.name + "，f/1.8。");

  // Lighting
  if (l) parts.push(l.name + "——" + l.desc.split("·")[0].trim() + "。");

  // Style
  if (s) parts.push(s.name + "风格——" + s.desc.split("·")[0].trim() + "。");

  // Textures
  if (sel.textures && sel.textures.length > 0) {
    const txArr = sel.textures.map(id => findItem(textures, id)).filter(Boolean);
    parts.push("质感：" + txArr.map(t => t.desc.split("·")[0]).join("；") + "。");
  }

  parts.push("8K超清，超写实电影质感。");
  parts.push("");

  // Dialog
  if (dialog) {
    parts.push("/* 💬 台词 */");
    parts.push("台词：" + dialog);
    parts.push("");
  }

  // Negative prompt
  parts.push("/* ⚠️ 负面提示词 */");
  let negBase = "模糊、低画质、面部变形、多余手指、水印、字幕、logo、ui界面";
  if (extraNeg) negBase += "、" + extraNeg;
  parts.push("负面：" + negBase);

  // Params
  parts.push("");
  parts.push("/* ⚙️ 参数 */");
  parts.push("--ar 9:16");
  parts.push("模式：多镜头叙事（推荐）");

  const output = parts.join("\n");
  document.getElementById("outputText").textContent = output;
  document.getElementById("outputBox").style.display = "block";
  document.getElementById("outputBox").scrollIntoView({ behavior:"smooth" });
}

// ====== EVENTS ======
document.getElementById("btnGenerate").addEventListener("click", generate);
document.getElementById("btnCopy").addEventListener("click", function() {
  navigator.clipboard.writeText(document.getElementById("outputText").textContent).then(() => {
    const btn = this; btn.textContent = "✅ 已复制！"; setTimeout(()=>btn.textContent="📋 一键复制",2000);
  });
});
document.getElementById("btnClear").addEventListener("click", function() {
  sel = { genre:null, style:null, lighting:null, lens:null, textures:[] };
  ["inSubject","inAction","inScene","inDialog","inRefs","inNegative"].forEach(id=>document.getElementById(id).value="");
  document.getElementById("outputBox").style.display = "none";
  renderAll(); updateSummary();
});

});
document.getElementById("btnTabGenerate").addEventListener("click", function() {
  this.classList.add("active"); document.getElementById("btnTabEngine").classList.remove("active");
  document.getElementById("tabEngine").classList.remove("active"); document.getElementById("tabGenerate").classList.add("active");
});

// Init
renderAll();
</script>
